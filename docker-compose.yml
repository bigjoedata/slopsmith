services:
  web:
    build: .
    ports:
      # Map to port 6666 to capture that Robert Johnson magic!
      - "8000:8000"
    volumes:
      # Mount your Rocksmith DLC folder (adjust path for your system)
      - ${DLC_PATH:-/mnt/user/Media/Games/Rocksmith/dlc}:/dlc
      # Persistent config and cache
      - rocksmith-config:/config
      # Mount source for live reload during development
      - ./static:/app/static
      - ./server.py:/app/server.py
      - ./ug_browser.py:/app/ug_browser.py
      - ./lib:/app/lib
      - ./plugins:/app/plugins
      # Optional: mount Firefox profile for CustomsForge auth
      # - ~/.mozilla/firefox:/firefox:ro
    environment:
      - PYTHONPATH=/app/lib:/app
      - DLC_DIR=/dlc
      - CONFIG_DIR=/config
      - RSCLI_PATH=/opt/rscli/RsCli
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1

volumes:
  rocksmith-config:
